services:
  jenkins-docker:
    image: docker:27.3.1-dind
    container_name: jenkins-docker
    restart: unless-stopped
    privileged: true                 # DinD needs kernel namespaces unavailable to unprivileged containers
    init: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - jenkins-docker-certs:/certs/client
    expose:
      - "2376"
    networks:
      jenkins:
        aliases:
          - docker
    command: --storage-driver overlay2
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g

  my-jenkins:
    build: .
    image: my-jenkins:local
    pull_policy: build
    container_name: my-jenkins
    restart: unless-stopped
    init: true
    depends_on:
      jenkins-docker:
        condition: service_healthy   # "started" is not enough — DinD must finish generating TLS certs first
    environment:
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
      # Relaxed CSP: HTML Publisher / Allure require inline styles to render in the browser.
      # Default Jenkins CSP blocks all inline styles — this is a known Jenkins limitation.
      - JAVA_OPTS=-Dhudson.model.DirectoryBrowserSupport.CSP="default-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';"
    volumes:
      - jenkins-data:/var/jenkins_home
      - jenkins-docker-certs:/certs/client:ro
    ports:
      - "9000:8080"
      - "50000:50000"
    networks:
      - jenkins
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g

networks:
  jenkins:
    driver: bridge

volumes:
  jenkins-docker-certs:
  jenkins-data:
