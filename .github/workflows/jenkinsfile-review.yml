name: Jenkinsfile Best Practices Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'Jenkinsfile'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.actor, '[bot]') }}
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review Jenkinsfile changes
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash,Write"
            --model claude-sonnet-4-6
            --effort medium
            --max-turns 15
          prompt: |
            Review the changes to `Jenkinsfile` in this pull request against Jenkins pipeline best practices.

            Focus on:
            1. Declarative pipeline structure — correct use of agent, stages, post blocks
            2. Credentials handling — secrets must use withCredentials with single-quoted shell, never environment block interpolation
            3. Timeouts and options — pipeline-level timeout, timestamps, ansiColor, buildDiscarder, disableConcurrentBuilds
            4. Agent label specificity — never `agent any`, always a label expression
            5. post { } block design — always/failure/success conditions, reporting in always
            6. Parallel stages — correct syntax, no duplicate keys, fail-fast considerations
            7. Shared library pinning — @Library must include a version tag, never float on master
            8. stash/unstash usage — warn if large directories are stashed (target/, node_modules/)
            9. CPS safety — flag any closures or .collect{} that may trigger NotSerializableException

            Read the file `docs/references/jenkins-best-practices.md` for the full project-specific rules.

            Step 1 — Write your findings as a JSON object to `_site/review-data.json` using the Write tool.
            Get the current UTC timestamp first by running: date -u +"%Y-%m-%dT%H:%M:%SZ"
            Use this exact schema:
            {
              "pr": ${{ github.event.pull_request.number || 0 }},
              "repo": "${{ github.repository }}",
              "generated_at": "<UTC timestamp from above>",
              "findings": [
                {
                  "severity": "critical|high|medium|low",
                  "title": "Short finding title (max 80 chars)",
                  "description": "What the problem is and where in the file",
                  "fix": "Concrete fix instruction"
                }
              ]
            }
            If no issues found, set "findings" to an empty array [].

            Step 2 — Merge template with data by running:
            mkdir -p _site && python3 -c "
            with open('_site/review-data.json') as f: data = f.read()
            with open('docs/review-template.html') as t: tmpl = t.read()
            with open('_site/index.html', 'w') as o: o.write(tmpl.replace('REVIEW_DATA_PLACEHOLDER', data))
            "

            Step 3 — Post findings as a PR comment using the gh CLI (skip this step if the PR number is empty):
              gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "YOUR_REVIEW_TEXT"

            The PR comment must contain:
            - A one-line summary: "X issues found (Y critical, Z high)"
            - A severity-ranked list of findings (Critical / High / Medium / Low) with a concrete fix for each
            - A link to the full HTML report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
            - If no issues found: "No issues found — Jenkinsfile follows best practices"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
