name: Jenkinsfile Best Practices Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'Jenkinsfile'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review Jenkinsfile changes
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash,Write"
            --model claude-sonnet-4-6
            --effort medium
            --max-turns 15
          prompt: |
            Review the changes to `Jenkinsfile` in this pull request against Jenkins pipeline best practices.

            Focus on:
            1. Declarative pipeline structure — correct use of agent, stages, post blocks
            2. Credentials handling — secrets must use withCredentials with single-quoted shell, never environment block interpolation
            3. Timeouts and options — pipeline-level timeout, timestamps, ansiColor, buildDiscarder, disableConcurrentBuilds
            4. Agent label specificity — never `agent any`, always a label expression
            5. post { } block design — always/failure/success conditions, reporting in always
            6. Parallel stages — correct syntax, no duplicate keys, fail-fast considerations
            7. Shared library pinning — @Library must include a version tag, never float on master
            8. stash/unstash usage — warn if large directories are stashed (target/, node_modules/)
            9. CPS safety — flag any closures or .collect{} that may trigger NotSerializableException

            Read the file `docs/references/jenkins-best-practices.md` for the full project-specific rules.

            Step 1 — Write an HTML report to `_site/review/index.html`.
            The file must be a complete, self-contained HTML5 document (inline CSS only, no external dependencies) with:
            - Header: "Jenkinsfile Review — PR #${{ github.event.pull_request.number || 'manual' }}" and generation timestamp
            - Summary line: "X issues found (Y critical, Z high, W medium, V low)" or a green banner if no issues
            - Findings list sorted by severity, each entry containing:
                - Severity badge color-coded: Critical = #d73a49, High = #e36209, Medium = #b08800, Low = #6a737d
                - Finding description
                - Concrete fix suggestion
            Use clean typography, max-width 860px centered layout, system font stack.

            Step 2 — Post findings as a PR comment using the gh CLI (skip this step if the PR number is empty):
              gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body "YOUR_REVIEW_TEXT"

            The PR comment must contain:
            - A one-line summary: "X issues found (Y critical, Z high)"
            - A severity-ranked list of findings (Critical / High / Medium / Low) with a concrete fix for each
            - A link to the full HTML report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/review/
            - If no issues found: "No issues found — Jenkinsfile follows best practices"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
